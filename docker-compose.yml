version: '3.8'

services:
  api:
    build: .
    container_name: vm_api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
    environment:
      # DATABASE_URL debe usar el nombre del servicio 'db' como host
      - DATABASE_URL=postgresql://postgres:vm_admin123@db:5432/observatorio_vm
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: vm_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vm_admin123
      POSTGRES_DB: observatorio_vm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vm_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: