version: '3.8'

services:
  api:
    build: .
    container_name: vm_api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

  scraper:
    build: ./vm_scraper
    container_name: vm_scraper
    volumes:
      - ./vm_scraper:/scraper
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: vm_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vm_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: